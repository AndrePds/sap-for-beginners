bundle:
  name: sap-medallion

include:
  - resources/pipeline_sap_medallion.yml

# ---------------------------------------------------------------------------
# Variables – override per target or CLI: databricks bundle deploy --var="catalog=prd"
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: "Unity Catalog name (dev | prd)."
    default: workspace

  bronze_schema:
    description: "Schema for Bronze layer tables (raw ingestion)."
    default: sap_raw

  silver_schema:
    description: "Schema for Silver layer tables (typed, filtered, domain models)."
    default: sap_silver

  gold_schema:
    description: "Schema for Gold layer tables (KPI aggregations)."
    default: sap_gold

  source_base_path:
    description: >
      Root path with one sub-folder per SAP table (lowercase table name).
      Upload datasets/generator/sample_data/ contents here before running.
      Example layout: /Volumes/workspace/sap_raw/sap-files/kna1/
    default: /Volumes/workspace/sap_raw/sap-files

  schema_location:
    description: "Base path for Auto Loader schema-evolution checkpoints"
    default: /Volumes/workspace/sap_raw/_autoloader_checkpoints

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog:         workspace
      bronze_schema:   sap_raw
      silver_schema:   sap_silver
      gold_schema:     sap_gold
      source_base_path: /Volumes/workspace/sap_raw/sap-files
      schema_location:  /Volumes/workspace/sap_raw/_autoloader_checkpoints

  prd:
    mode: production
    variables:
      catalog:         prd
      bronze_schema:   sap_raw
      silver_schema:   sap_silver
      gold_schema:     sap_gold
      source_base_path: /Volumes/prd/sap/raw
      schema_location:  /Volumes/prd/sap/_autoloader_checkpoints
