bundle:
  name: sap-medallion

include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Variables – override per target or CLI: databricks bundle deploy --var="catalog=prd"
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: "Unity Catalog name (dev | prd)"
    default: dev

  source_base_path:
    description: >
      Root path with one sub-folder per SAP table (lowercase table name).
      Upload datasets/generator/sample_data/ contents here before running.
      Example layout: /Volumes/dev/sap/raw/kna1/  /Volumes/dev/sap/raw/vbak/
    default: /Volumes/dev/sap/raw

  schema_location:
    description: "Base path for Auto Loader schema-evolution checkpoints"
    default: /Volumes/dev/sap/_autoloader_checkpoints

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: dev
      source_base_path: /Volumes/dev/sap/raw
      schema_location:  /Volumes/dev/sap/_autoloader_checkpoints

  prd:
    mode: production
    variables:
      catalog: prd
      source_base_path: /Volumes/prd/sap/raw
      schema_location:  /Volumes/prd/sap/_autoloader_checkpoints
