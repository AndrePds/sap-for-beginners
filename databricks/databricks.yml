bundle:
  name: sap-medallion

include:
  - resources/pipeline_sap_medallion.yml

# ---------------------------------------------------------------------------
# Variables – override per target or CLI: databricks bundle deploy --var="catalog=prd"
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: "Unity Catalog name (dev | prd). All DLT tables land in catalog.sap_raw.*"
    default: workspace

  source_base_path:
    description: >
      Root path with one sub-folder per SAP table (lowercase table name).
      Upload datasets/generator/sample_data/ contents here before running.
      Example layout: /Volumes/workspace/sap_raw/sap/raw/kna1/
    default: /Volumes/workspace/sap_raw/sap/raw

  schema_location:
    description: "Base path for Auto Loader schema-evolution checkpoints"
    default: /Volumes/workspace/sap_raw/sap/_autoloader_checkpoints

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: workspace
      source_base_path: /Volumes/workspace/sap_raw/sap/raw
      schema_location:  /Volumes/workspace/sap_raw/sap/_autoloader_checkpoints

  prd:
    mode: production
    variables:
      catalog: prd
      source_base_path: /Volumes/prd/sap/raw
      schema_location:  /Volumes/prd/sap/_autoloader_checkpoints
