resources:
  pipelines:
    sap_silver:
      name: "SAP Medallion - Silver [${bundle.target}]"
      description: >
        L1: Cleans and types Bronze tables (date casting, null handling, DLT expectations).
        L2: Builds domain models (dim_customer, dim_material, fact_sales_order, etc.).
        Reads from catalog.bronze_sap; writes to catalog.silver_sap.
      catalog: ${var.catalog}
      schema: silver_sap
      channel: CURRENT
      photon: false
      libraries:
        - file:
            path: ../src/pipelines/silver_pipeline.py
      configuration:
        bronze_catalog: ${var.catalog}
