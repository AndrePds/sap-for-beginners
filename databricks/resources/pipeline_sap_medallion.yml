resources:
  pipelines:
    sap_medallion:
      name: "SAP Medallion - Bronze / Silver / Gold [${bundle.target}]"

      # Default schema: Bronze tables land here (no explicit schema in bronze_pipeline.sql).
      # Silver and Gold tables use explicit ${catalog}.${silver_schema} / ${catalog}.${gold_schema}
      # prefixes in their CREATE statements, so they land in separate schemas.
      catalog: ${var.catalog}
      schema:  ${var.bronze_schema}

      channel: CURRENT
      continuous: false
      serverless: true

      # DLT library order matters: Bronze -> Silver -> Gold
      # The DLT runtime still resolves the dependency graph automatically,
      # but explicit ordering makes the pipeline easier to read in the UI.
      libraries:
        - file:
            path: ../src/pipelines/bronze_pipeline.sql
        - file:
            path: ../src/pipelines/silver_pipeline.sql
        - file:
            path: ../src/pipelines/gold_pipeline.sql

      # Spark conf keys referenced as ${key} inside SQL files
      configuration:
        catalog:          ${var.catalog}
        silver_schema:    ${var.silver_schema}
        gold_schema:      ${var.gold_schema}
        source_base_path: ${var.source_base_path}
        schema_location:  ${var.schema_location}
