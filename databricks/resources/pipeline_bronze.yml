resources:
  pipelines:
    sap_bronze:
      name: "SAP Medallion - Bronze [${bundle.target}]"
      description: >
        Ingests all 41 SAP source tables from JSONL files using Auto Loader.
        Writes raw Delta tables to catalog.bronze_sap.bronze_<table>.
      catalog: ${var.catalog}
      schema: bronze_sap
      channel: CURRENT
      photon: false
      libraries:
        - file:
            path: ../src/schemas/bronze_schemas.py
        - file:
            path: ../src/pipelines/bronze_pipeline.py
      configuration:
        source_base_path: ${var.source_base_path}
        schema_location:  ${var.schema_location}
